<script>

    const weekData = [
    {
        "id": 4,

            {
                "type": "msg",
                "title": "Produit de parts",
                "body": "<p class=\"content-chunk\">Multiplier deux fractions :<br><br>`(a/b) × (c/d) = (a×c)/(b×d)</p>"
            },
            {
                "type": "quiz",
                "title": "1/2 × 1/3",
                "q": "1/2 × 1/3` =",
                "opts": [
                    "2/3",
                    "1/6",
                    "1/5"
                ],
                "a": 1,
                "feed": "Exact ! <code>(1×1)/(2×3)=1/6</code>."
            },
            {
                "type": "write",
                "title": "2/5 × 3/4",
                "q": "Calcule <code>2/5 × 3/4</code> (forme irréductible).",
                "requirements": {
                    "keywords": [
                        "3/10",
                        "6/20"
                    ],
                    "minWords": 1

                "hint": "(2×3)/(5×4)`, puis simplifie.",

                "type": "quiz",

                    "8/4",

                "feed": "Oui ! <code>8/4 = 2</code> (l'entier = <code>8/1</code>)."

                "type": "write",
                "title": "3/8 × 4",

                    "keywords": [

                        "12/8",
                        "1.5",
                        "1,5"

                "hint": "4 = 4/1`. Simplifie 4 et 8 avant.",
                "feed": "Parfait ! <code>12/8 = 3/2</code>."
            },
            {
                "type": "msg",
                "title": "Diviser = × inverse",

            },
            {
                "type": "quiz",
                "title": "Inverse de 3/4",

                    "-3/4"

            {
                "type": "write",
                "title": "1/2 ÷ 1/4",

                "requirements": {
                    "keywords": [
                        "2"
                    ],
                    "minWords": 1
                },
                "hint": "× 4/1`.",

                "type": "quiz",

                "a": 1,
                "feed": "Exact ! Diviser = × l'inverse. Ici : <code>2/3 × 3/1 = 2</code>."
            },
            {
                "type": "write",
                "title": "3/5 ÷ 6/5",
                "q": "Calcule <code>3/5 ÷ 6/5</code>.",
                "requirements": {
                    "keywords": [
                        "1/2"
                    ],
                    "minWords": 1
                },
                "hint": "× 5/6`, puis simplifie.",
                "feed": "Parfait ! <code>(3/5)×(5/6)=3/6=1/2</code>."
            },
            {
                "type": "msg",

            },
            {
                "type": "quiz",
                "title": "Dénominateur interdit",

                    "5",
                    "1",
                    "0"
                ],
                "a": 1,
                "feed": "Oui ! Si <code>x=1</code>, dénominateur <code>0</code> → expression impossible."
            },
            {
                "type": "write",
                "title": "Simplifier avant multiplier",
                "q": "Calcule en simplifiant d'abord : <code>4/9 × 3/8</code>.",
                "requirements": {
                    "keywords": [
                        "1/6"
                    ],
                    "minWords": 1
                },
                "hint": "Simplifie 4 et 8 (÷4), 3 et 9 (÷3).",

            },
            {
                "type": "interactive",
                "title": "Choisir l'opération",
                "q": "« Combien de parts de <code>1/8</code> dans <code>3/4</code> ? » se traduit par :",
                "opts": [
                    "3/4 × 1/8",
                    "3/4 ÷ 1/8",
                    "3/4 + 1/8"
                ],
                "a": 1,
                "feed": "Oui : division = nombre de parts. Résultat : 6."
            },

                "type": "challenge",
                "title": "Boss Produits",

                    "keywords": [
                        "1/5",
                        "2/10"
                    ],
                    "minWords": 1
                },

            }
        ]
    }
