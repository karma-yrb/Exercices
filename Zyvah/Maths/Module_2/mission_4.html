    const weekData = [
        {
            "id": 4,

            "steps": [
                {
                    "type": "msg",
                    "title": "L'Équation : Trouver le Réglage",
                    "body": "<p class=\"content-chunk\">Zyvah, une <b>équation</b>, c'est une <b>balance</b> : ce qui est à gauche = ce qui est à droite.<br><br><b>Résoudre</b>, c'est trouver la valeur de <code>x</code> (l'inconnue) qui <b>équilibre</b> la balance.<br><br><b>Exemple :</b>  <br><code>x + 3 = 7</code><br><br>Quelle valeur de <code>x</code> rend cette égalité vraie ?  <br>→ <code>x = 4</code> (car <code>4 + 3 = 7</code>)<br><br><b>En studio :</b> Si le gain <code>x</code> plus 3 dB donne 7 dB total, quel est le gain de base ?  <br>→ Résoudre l'équation !</p>"
                },
                {
                    "type": "quiz",
                    "q": "Si je fais <b>+5</b> à gauche de l'égalité, que dois-je faire à droite pour garder l'équilibre ?",

                        "+ 5",
                        "- 5",
                        "Rien"

                    "feed": "Exact ! Tout ce qu'on fait d'un côté, on doit le faire de l'autre pour <b>préserver l'égalité</b>.",
                    "title": "Principe de l'équilibre",

                },
                {
                    "type": "write",

                    "title": "Résoudre x + 5 = 12"
                },
                {
                    "type": "quiz",
                    "q": "Pour résoudre <code>2x = 10</code>, quelle opération faire ?",

                        "validationType": "equation",

                    "title": "Résoudre 3x - 7 = 11"

                {
                    "type": "msg",
                    "title": "Le Produit-Nul",

                    "a": 0

                    "title": "Résoudre (x + 3)(x - 5) = 0"
                },
                {
                    "type": "msg",
                    "title": "Factoriser pour résoudre",
                    "body": "<p class=\"content-chunk\">Parfois, l'équation n'est <b>pas factorisée</b>. Il faut d'abord la factoriser !<br><br><b>Exemple :</b>  <br><code>x² - 9 = 0</code><br><br>Étape 1 : Reconnaître <code>a² - b²</code> → Factoriser  <br><code>(x + 3)(x - 3) = 0</code><br><br>Étape 2 : Produit-nul  <br><code>x = -3</code> ou <code>x = 3</code><br><br><b>Stratégie :</b>  <br>1️⃣ Tout ramener à gauche (= 0 à droite)  <br>2️⃣ Factoriser  <br>3️⃣ Produit-nul</p>"
                },
                {
                    "type": "write",
                    "q": "Résous en factorisant d'abord :<br><br><code>x² - 9 = 0</code><br><br>Donne les 2 solutions.",

                            "3"

                        "validationType": "equation",
                        "expectNumbers": true

                },
                {
                    "type": "interactive",
                    "q": "Pour résoudre <code>x² + 5x = 0</code>, quelle est la <b>première</b> étape ?",
                    "opts": [
                        "Développer",
                        "Factoriser",
                        "Calculer x²"
                    ],
                    "feed": "Exact ! On factorise par <code>x</code> : <code>x(x + 5) = 0</code>, puis produit-nul.",
                    "title": "Stratégie de résolution",

                },

                    "type": "write",
                    "q": "Résous par factorisation :<br><br><code>x² + 5x = 0</code><br><br>Donne les 2 solutions.",

                        "keywords": [
                            "0",
                            "-5"

                        "minWords": 3,
                        "enforceKeywords": true,
                        "validationType": "equation",
                        "expectNumbers": true
                    },
                    "hint": "Facteur commun : <code>x(x + 5) = 0</code>. Produit-nul : <code>x = 0</code> ou <code>x + 5 = 0</code>.",

                    "title": "Résoudre x² + 5x = 0"

                    ],

                    "title": "Mise en équation",
                    "a": 0
                },

                    "type": "challenge",
                    "q": "Un ingénieur modélise le signal d'un compresseur par :<br><br><code>x² + 7x = 0</code><br><br>Quelles sont les <b>valeurs de x</b> (réglages du compresseur) qui annulent le signal ?<br><br>Résous cette équation. Donne les 2 solutions.",

                        "keywords": [
                            "0",
                            "-7"
                        ],
                        "minWords": 2,
                        "validationType": "equation",
                        "expectNumbers": true
                    },
                    "hint": "Factorise d'abord par <code>x</code>, puis applique le produit-nul.",
                    "feed": "<b>Seance 4 TERMINÉE</b> ✅<br><br>Maîtrise totale des équations ! Tu sais isoler une variable, utiliser le produit-nul et mettre en équation des problèmes concrets.<br><br>Dernière Seance : le <b>Studio Master Challenge</b> !<br><br><b>Badge débloqué :</b> 🎯 Equation Solver",
                    "title": "Boss Équation Complète"
                }
            ]
        }
