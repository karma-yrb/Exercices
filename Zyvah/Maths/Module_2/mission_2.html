    const weekData = [
        {
            "id": 2,
            "title": "Identités Remarquables",

                {
                    "type": "msg",
                    "title": "Les Patterns du Studio",
                    "body": "<p class=\"content-chunk\">Zyvah, certains développements reviennent <b>tout le temps</b>. Les mathématiciens ont créé des <b>raccourcis</b> : les <b>identités remarquables</b>.<br><br>Ce sont les <b>presets</b> du calcul littéral : tu les reconnais, tu les appliques instantanément.<br><br><b>Les 3 formules magiques :</b>  <br>1️⃣ <code>(a + b)² = a² + 2ab + b²</code>  <br>2️⃣ <code>(a - b)² = a² - 2ab + b²</code>  <br>3️⃣ <code>(a + b)(a - b) = a² - b²</code></p>"

                    "type": "quiz",

                            "x²",
                            "6x",

                    "title": "Développer (x + 3)²"

                    "type": "msg",
                    "title": "Formule (a + b)² expliquée",
                    "body": "<p class=\"content-chunk\">Tu viens de faire <code>(x + 3)² = x² + 6x + 9</code>.<br><br>Observe le <b>pattern</b> :<br>- Premier terme au carré : <code>x²</code><br>- Deux fois le produit des deux : <code>2 × x × 3 = 6x</code><br>- Deuxième terme au carré : <code>3² = 9</code><br><br><b>Formule universelle :</b>  <br><code>(a + b)² = a² + 2ab + b²</code><br><br><b>Exemple :</b> <code>(x + 5)²</code><br>- <code>a = x</code>, <code>b = 5</code><br>- Résultat direct : <code>x² + 2(x)(5) + 5² = x² + 10x + 25</code><br><br>C'est le <b>preset n°1</b> !</p>"

                {
                    "type": "write",
                    "q": "Utilise la formule <code>(a + b)² = a² + 2ab + b²</code> pour développer <b>instantanément</b> :<br><br><code>(x + 5)²</code>",

                    "title": "Appliquer (x + 5)²"

                    "type": "quiz",

                        "(a + b)²",
                        "(a - b)²",
                        "(a + b)(a - b)"

                    "feed": "Exact ! Il y a un signe <b>−</b>, donc c'est le <b>preset n°2</b> : <code>(a - b)²</code>.",
                    "title": "Reconnaissance carré d'une différence",
                    "a": 1

                    "type": "write",

                        "keywords": [

                            "-8x",
                            "16",
                            "+"

                        "minWords": 4,
                        "validationType": "algebraic"

                {
                    "type": "msg",
                    "title": "Formule (a - b)² expliquée",
                    "body": "<p class=\"content-chunk\"><b>Différence entre les deux presets :</b><br><br><b>Preset n°1 :</b> <code>(a + b)² = a² <b>+ 2ab</b> + b²</code>  <br><b>Preset n°2 :</b> <code>(a - b)² = a² <b>- 2ab</b> + b²</code><br><br><b>Seul le signe du terme central change !</b><br><br><b>Exemples :</b><br>- <code>(x + 3)²</code> → <code>x² <b>+ 6x</b> + 9</code><br>- <code>(x - 3)²</code> → <code>x² <b>- 6x</b> + 9</code><br><br><b>Piège classique :</b>  <br><code>(x - 3)² ≠ x² - 9</code> ❌  <br><code>(x - 3)² = x² - 6x + 9</code> ✅</p>"
                },
                {
                    "type": "write",
                    "q": "Développe avec le preset n°2 :<br><br><code>(2x - 3)²</code>",
                    "requirements": {
                        "keywords": [
                            "4x²",
                            "-12x",
                            "9",
                            "+"
                        ],
                        "minWords": 4,
                        "validationType": "algebraic"
                    },
                    "hint1": "Identifie <code>a</code> et <code>b</code> dans l'expression, puis applique la formule <code>(a - b)² = a² - 2ab + b²</code>.",

                    "title": "Appliquer (2x - 3)²"
                },
                {
                    "type": "msg",
                    "title": "Différence de carrés",
                    "body": "<p class=\"content-chunk\"><b>Le preset n°3</b> est encore plus puissant :<br><br><code>(a + b)(a - b) = a² - b²</code><br><br><b>Magie :</b> Les termes croisés <b>s'annulent</b> !<br><br><b>Démonstration :</b>  <br><code>(x + 5)(x - 5)</code>  <br>= <code>x² - 5x + 5x - 25</code>  <br>= <code>x² - 25</code> (les <code>±5x</code> disparaissent)<br><br><b>Reconnaissance :</b>  <br>Si tu vois <code>(truc + machin)(truc - machin)</code>, c'est le preset n°3 !</p>"
                },

                    "feed": "Instantané ! <code>x² - 49</code>. Le preset n°3 est ultra rapide.",

                    "type": "write",
                    "q": "Développe avec le preset n°3 :<br><br><code>(3x + 2)(3x - 2)</code>",
                    "requirements": {
                        "keywords": [
                            "9x²",
                            "-4",
                            "4"
                        ],
                        "minWords": 4,
                        "enforceKeywords": true,
                        "validationType": "algebraic"
                    },
                    "hint": "<code>a = 3x</code>, <code>b = 2</code>. Résultat : <code>(3x)² - (2)²</code>.",
                    "feed": "Parfait ! <code>9x² - 4</code>. Gain de temps maximal.",
                    "title": "Appliquer (3x + 2)(3x - 2)"
                },
                {
                    "type": "interactive",
                    "q": "Quel preset utiliser pour développer <code>(2x - 5)²</code> ?",
                    "opts": [
                        "Preset n°1 : (a + b)²",
                        "Preset n°2 : (a - b)²",
                        "Preset n°3 : (a + b)(a - b)"
                    ],
                    "feed": "Exact ! Il y a un carré <code>²</code> et un signe <b>−</b>, donc c'est le preset n°2.",

                    "hint": "Aire d'un carré = côté × côté = <code>(x + 12)²</code>. Utilise le preset n°1.",
                    "feed": "<b>Seance 2 TERMINÉE</b> ✅<br><br>Les 3 identités remarquables sont dans ta tête ! Tu peux maintenant développer des expressions complexes en un éclair.<br><br><b>Badge débloqué :</b> ⚡ Preset Master",
                    "title": "Boss Identités Remarquables"
                }
            ]
        }
