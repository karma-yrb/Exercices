<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo= ">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyvah - Studio Dashboard</title>
    <link rel="stylesheet" href="../assets/shared/hub.css">
</head>
<body class="hub-page hub-zyvah">
    <div class="container">
        
        <!-- HEADER -->
        <header>
            <div class="header-top">
                <div class="avatar">🌟</div>
                <div>
                    <h1 class="title-h1 glow-zyvah">ZYVAH</h1>
                    <p class="subtitle">Studio Dashboard • Music Universe</p>
                </div>
            </div>
            <div class="global-bar-container">
                <div id="global-bar" class="global-bar-fill"></div>
            </div>
        </header>

        <div class="grid gap-4">
            <!-- MATHS -->
            <a href="./Maths/index.html" class="glass-card card-maths">
                <div class="icon-box text-purple-400">
                    <svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6V12L16,14.5L16.8,13.2L13.5,11.2V6H12Z"/></svg>
                </div>
                <div class="flex-grow">
                    <h3 class="subject-title text-purple-400">Mathématiques</h3>
                    <p class="mission-title text-slate-100">Mastering des Priorités</p>
                    <div class="prog-container">
                        <div class="prog-bar-bg">
                            <div id="math-bar" class="prog-bar-fill bg-purple-500"></div>
                        </div>
                        <p id="math-count" class="prog-text">0/5 SEANCES</p>
                    </div>
                </div>
                <div class="chevron text-purple-400">
                    <svg viewBox="0 0 24 24"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
                </div>
            </a>

            <!-- SES -->
            <a href="./SES/index.html" class="glass-card card-ses">
                <div class="icon-box text-cyan-400">
                    <svg viewBox="0 0 24 24"><path d="M16 11V3H8V11H2V21H22V11H16M10 5H14V11H10V5M4 19V13H8V19H4M14 19H10V13H14V19M20 19H16V13H20V19Z"/></svg>
                </div>
                <div class="flex-grow">
                    <h3 class="subject-title text-cyan-400">S.E.S.</h3>
                    <p class="mission-title text-slate-100">Lancement du Label</p>
                    <div class="prog-container">
                        <div class="prog-bar-bg">
                            <div id="ses-bar" class="prog-bar-fill bg-cyan-500"></div>
                        </div>
                        <p id="ses-count" class="prog-text">0/5 SEANCES</p>
                    </div>
                </div>
                <div class="chevron text-cyan-400">
                    <svg viewBox="0 0 24 24"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
                </div>
            </a>
        </div>

        <button type="button" onclick="sendReport('zyvah')" class="btn-report">
            Partager mon avancement
        </button>

    </div>

    <script src="../assets/shared/version.js"></script>
    <script src="../assets/shared/storage-keys.js"></script>
    <script src="../assets/shared/progress-report.js"></script>
    <script>
        function updateProgress() {
            const maths = ProgressReport.getSubjectProgress('maths');
            const ses = ProgressReport.getSubjectProgress('ses');

            ProgressReport.setBarWidth('math-bar', maths.percent);
            document.getElementById('math-count').innerText = `${maths.done}/${maths.total} SEANCES`;
            ProgressReport.setBarWidth('ses-bar', ses.percent);
            document.getElementById('ses-count').innerText = `${ses.done}/${ses.total} SEANCES`;
            ProgressReport.setBarWidth('global-bar', (maths.percent + ses.percent) / 2);
        }

        updateProgress();
    </script>
</body>
</html>
