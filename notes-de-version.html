<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes de version — Apprentissage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #06070d;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
        }

        .wrap {
            max-width: 48rem;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        .eyebrow {
            color: #3b82f6;
            font-weight: 700;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin: 0.75rem 0 0.5rem;
        }

        .lede {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .back {
            display: inline-block;
            margin-bottom: 2rem;
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .back:hover { color: #93c5fd; }

        .release {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }

        .release-head {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.75rem 1rem;
            margin-bottom: 0.75rem;
        }

        .ver {
            font-weight: 800;
            font-size: 1.35rem;
            color: #e2e8f0;
        }

        .date {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .summary {
            color: #94a3b8;
            margin: 0 0 1.25rem;
            line-height: 1.5;
        }

        .module {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .module h3 {
            margin: 0 0 0.5rem;
            font-size: 0.95rem;
            font-weight: 700;
            color: #cbd5e1;
        }

        .module ul {
            margin: 0;
            padding-left: 1.15rem;
            color: #94a3b8;
            line-height: 1.55;
        }

        .module li { margin-bottom: 0.35rem; }

        .empty {
            color: #64748b;
            font-style: italic;
        }

        footer {
            margin-top: 2.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <a class="back" href="index.html">← Retour au dashboard</a>
        <p class="eyebrow">Journal produit</p>
        <h1>Notes de version</h1>
        <p class="lede">Ce qui a changé à chaque livraison, classé par module. La version affichée partout sur le site est la version produit (pas la révision <code>_vK</code> de progression).</p>

        <div id="releases-root">
            <p class="empty">Chargement…</p>
        </div>

        <footer>
            <span id="app-version">Version …</span>
            · Source : CHANGELOG.md
        </footer>
    </div>

    <script src="assets/shared/version.js"></script>
    <script src="assets/shared/releases.js"></script>
    <script>
        (function renderReleases() {
            const root = document.getElementById('releases-root');
            const releases = window.APP_RELEASES || [];
            if (!releases.length) {
                root.innerHTML = '<p class="empty">Aucune release documentée pour le moment.</p>';
                return;
            }

            root.innerHTML = releases.map((rel) => {
                const modules = (rel.modules || []).map((mod) => {
                    const items = (mod.changes || []).map((c) => '<li>' + escapeHtml(c) + '</li>').join('');
                    return (
                        '<div class="module">' +
                        '<h3>' + escapeHtml(mod.label) + '</h3>' +
                        '<ul>' + items + '</ul>' +
                        '</div>'
                    );
                }).join('');

                return (
                    '<article class="release">' +
                    '<div class="release-head">' +
                    '<span class="ver">v' + escapeHtml(rel.version) + '</span>' +
                    '<span class="date">' + escapeHtml(rel.date || '') + '</span>' +
                    '</div>' +
                    '<p class="summary">' + escapeHtml(rel.summary || '') + '</p>' +
                    modules +
                    '</article>'
                );
            }).join('');
        })();

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
